version: '3.9'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - node-api
      - python-api

  node-api:
    build:
      context: ./backend/node
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PYTHON_URL=http://python-api:8001
    depends_on:
      - python-api

  python-api:
    build:
      context: ./backend/python
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
